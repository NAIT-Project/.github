name: 버그 보고
description: 오류 및 예상과 다른 동작을 등록합니다.
title: "[FIX] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      options:
        - Device
        - AI
        - Backend
        - Frontend
        - Database
        - Mobius
        - Common
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 문제 설명
      description: 발생한 문제를 구체적으로 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 정상이라면 어떻게 동작해야 하는지 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      value: |
        - OS:
        - Device:
        - Python / Java / Node 버전:
        - Browser:
        - 실행 Branch:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 또는 화면
      description: API Key와 개인정보는 제거하고 첨부해주세요.
