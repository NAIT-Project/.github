name: feature
description: 새로운 기능 구현 작업을 등록합니다.
title: "[FEAT] "
labels:
  - feature
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 구현할 기능과 필요한 이유를 작성해주세요.
      placeholder: |
        구현할 기능을 구체적으로 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      value: |
        - [ ] 요구사항 확인
        - [ ] 기능 구현
        - [ ] 입력값 및 예외 처리
        - [ ] 테스트
        - [ ] 문서 수정
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 작업을 완료한 것으로 볼지 작성해주세요.
      placeholder: |
        완료 조건을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료
      description: 관련 문서, API, 디자인, 선행 Issue를 작성해주세요.
